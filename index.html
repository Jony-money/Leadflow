<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LeadFlow — Find. Contact. Close.</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* Your original styles (kept mostly intact with minor cleanups) */

:root {
  --primary: #059669; --primary-light: #d1fae5; --primary-dark: #047857;
  --accent: #3b7ef8; --accent-dim: #eff3fe;
  --sidebar-bg: #0f172a; --sidebar-hover: #1e293b; --sidebar-active: #1e293b;
  --sidebar-text: #94a3b8; --sidebar-text-active: #f8fafc;
  --bg: #f3f4f6; --surface: #fff; --border: #e5e7eb;
  --text: #111827; --text-secondary: #6b7280; --text-muted: #9ca3af;
  --radius: 10px; --radius-sm: 6px;
}
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-size: 14px; line-height: 1.5; }

/* ... (rest of your CSS remains the same) ... */

<body>

<!-- Your HTML body content remains unchanged -->

<script>
// === CLEANED & FIXED JAVASCRIPT ===

/* Safe helpers */
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function toast(msg, ms = 2200, type = 'ok') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

/* LocalStorage helpers */
const LS = {
  CFG: 'lf_cfg',
  LEADS: 'lf_leads',
  APTS: 'lf_appts',
  TASKS: 'lf_tasks',
  EMAILS: 'lf_emails',
  CLIENTS: 'lf_clients',
  SUBS: 'lf_subs',
  ACTIVITY: 'lf_activity',
  PROSPECTING: 'lf_prospecting',
  KB: 'lf_kb',
  REVIEWS: 'lf_reviews',
};

function lsGet(key, fallback = null) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

/* Core data */
let cfg = lsGet(LS.CFG, { ready: false, mrrGoal: 25000, cashOnHand: 0 });
let leads = lsGet(LS.LEADS, []);
let appts = lsGet(LS.APTS, []);
let tasks = lsGet(LS.TASKS, []);
let clients = lsGet(LS.CLIENTS, []);
let emails = lsGet(LS.EMAILS, []);
let subs = lsGet(LS.SUBS, []);
let activity = lsGet(LS.ACTIVITY, []);
let prospecting = lsGet(LS.PROSPECTING, {});
let kbEntries = lsGet(LS.KB, []);
let reviews = lsGet(LS.REVIEWS, []);

/* Persist functions */
function persistCfg() { lsSet(LS.CFG, cfg); }
function persistClients() { lsSet(LS.CLIENTS, clients); }
function persistLeads() { lsSet(LS.LEADS, leads); }
// Add more persist* as needed

/* Navigation */
function navigate(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + id);
  if (page) page.classList.add('active');

  // Re-render dynamic pages
  if (id === 'dashboard') renderCommand();
  if (id === 'clients') renderClientsPage();
  if (id === 'kpi') renderKpi();
  if (id === 'tasks') renderTasks();
  if (id === 'appointments') renderAppointments();
  if (id === 'emails') renderEmails();
  if (id === 'templates') renderTemplates();
  if (id === 'activity') renderActivity();
  if (id === 'coverage') renderCoverage();
  if (id === 'billing') renderBilling();
  if (id === 'prospecting') renderProspecting();
  if (id === 'kb') renderKb();
  if (id === 'reviews') renderReviews();
  if (id === 'deliverables') renderDeliverables();
}

/* Boot */
function init() {
  if (!cfg.ready) {
    document.getElementById('setup').classList.add('show');
  } else {
    navigate('dashboard');
  }
  renderCommand();
  updateBadges();
  ensureCurrentMonthDeliverables();
}

window.onload = init;
</script>
</body>
</html>
