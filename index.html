<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f12">
<title>Training</title>
<style>
  :root{
    --bg:#0d0f12; --panel:#16191f; --panel-2:#1d212a; --line:#272c36;
    --txt:#e8eaed; --muted:#878d99; --dim:#5c6270;
    --accent:#ff7a33; --accent-dim:#7a3c1a; --good:#3ddc84; --good-dim:#16361f;
    --warn:#ffd24a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--txt);font-family:var(--sans);
    font-size:15px;line-height:1.4;padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 14px 80px}

  header{padding:18px 0 10px;position:sticky;top:0;background:linear-gradient(var(--bg) 70%,transparent);z-index:20}
  .brand{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  h1{font-size:22px;margin:0;letter-spacing:-.5px;font-weight:800}
  h1 .acc{color:var(--accent)}
  .todaytag{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;line-height:1.3}
  .todaytag b{color:var(--txt);display:block;font-size:13px}

  /* tabs */
  .tabs{display:flex;gap:6px;overflow-x:auto;margin-top:12px;padding-bottom:4px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:9px 13px;border-radius:11px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;
    display:flex;flex-direction:column;align-items:center;gap:1px;min-width:54px;transition:.12s}
  .tab small{font-family:var(--mono);font-size:9px;font-weight:600;opacity:.7;letter-spacing:.5px}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#1a0f06}
  .tab.active small{opacity:.85}
  .tab.rest{opacity:.6}
  .tab.today::after{content:"";width:4px;height:4px;border-radius:50%;background:var(--good);position:relative;top:-1px}
  .tab.active.today::after{background:#1a0f06}

  /* day header */
  .dayhead{display:flex;align-items:center;justify-content:space-between;margin:18px 0 4px}
  .dayhead h2{margin:0;font-size:18px;letter-spacing:-.3px}
  .dayhead .focus{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px}

  .section{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-top:12px;overflow:hidden}
  .sechead{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px;letter-spacing:.3px}
  .sechead .ico{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:13px;background:var(--panel-2)}
  .sechead .rest{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

  .ex{padding:12px 14px;border-bottom:1px solid var(--line)}
  .ex:last-child{border-bottom:none}
  .ex-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .ex-name{font-weight:600;font-size:14.5px}
  .ex-name .sup{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:1px}
  .ex-name .sup b{color:var(--txt);font-weight:600}
  .ex-scheme{font-family:var(--mono);font-size:12px;color:var(--accent);white-space:nowrap;font-weight:600}
  .pump{color:var(--good)}

  /* logging row */
  .logrow{display:flex;align-items:center;gap:7px;margin-top:9px;flex-wrap:wrap}
  .logrow input{background:var(--panel-2);border:1px solid var(--line);color:var(--txt);
    font-family:var(--mono);font-size:14px;padding:7px 8px;border-radius:8px;width:62px;text-align:center}
  .logrow input:focus{outline:none;border-color:var(--accent)}
  .logrow .x{color:var(--dim);font-family:var(--mono);font-size:13px}
  .logrow .unit{color:var(--muted);font-size:11px;font-family:var(--mono)}
  .logrow button{margin-left:auto;background:var(--accent);color:#1a0f06;border:none;font-weight:700;
    font-size:12px;padding:8px 12px;border-radius:8px;cursor:pointer}
  .logrow button:active{transform:scale(.97)}

  .hint{margin-top:8px;font-size:11.5px;font-family:var(--mono);line-height:1.5;color:var(--muted);
    background:var(--panel-2);border-radius:8px;padding:7px 9px;display:none}
  .hint.show{display:block}
  .hint .lvl{color:var(--good)}
  .hint .up{color:var(--accent);font-weight:700}
  .hint .last{color:var(--dim)}
  .pr{color:var(--warn)}

  .jog{display:flex;align-items:center;gap:12px;padding:14px}
  .jog .big{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--accent)}
  .jog .lbl{font-size:12px;color:var(--muted);line-height:1.3}
  .jog.opt .big{color:var(--good)}

  /* estimator / tracker cards */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-top:14px;padding:14px}
  .card h3{margin:0 0 10px;font-size:14px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .card h3 .ico{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:12px;background:var(--panel-2)}
  .field{display:flex;align-items:center;gap:10px;margin:8px 0}
  .field label{font-size:13px;color:var(--muted);flex:1}
  .field input,.field select{background:var(--panel-2);border:1px solid var(--line);color:var(--txt);
    font-family:var(--mono);font-size:14px;padding:8px;border-radius:8px;width:90px;text-align:center}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .burnout{margin-top:10px;border-top:1px solid var(--line);padding-top:11px}
  .brow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--muted)}
  .brow span:last-child{font-family:var(--mono);color:var(--txt)}
  .btot{display:flex;justify-content:space-between;margin-top:8px;padding-top:9px;border-top:1px solid var(--line);font-weight:700}
  .btot span:last-child{font-family:var(--mono);color:var(--accent);font-size:18px}

  .trk-empty{color:var(--dim);font-size:13px;font-style:italic}
  .trk-ex{border-top:1px solid var(--line);padding:10px 0}
  .trk-ex:first-of-type{border-top:none}
  .trk-ex .nm{font-size:13px;font-weight:600;display:flex;justify-content:space-between}
  .trk-ex .nm .best{font-family:var(--mono);font-size:11px;color:var(--warn)}
  .spark{display:flex;gap:3px;align-items:flex-end;height:30px;margin-top:6px}
  .spark .bar{flex:1;background:var(--accent-dim);border-radius:2px 2px 0 0;min-height:3px;position:relative}
  .spark .bar.last{background:var(--accent)}
  .trk-meta{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:4px;display:flex;justify-content:space-between}
  .clearbtn{background:none;border:1px solid var(--line);color:var(--dim);font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;margin-top:10px}

  .restday{text-align:center;padding:50px 20px}
  .restday .em{font-size:46px}
  .restday h2{margin:14px 0 6px;font-size:20px}
  .restday p{color:var(--muted);font-size:14px;max-width:300px;margin:0 auto}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--good);
    color:#06210f;font-weight:700;font-size:13px;padding:11px 18px;border-radius:11px;opacity:0;transition:.25s;z-index:50;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .save{color:var(--dim);font-family:var(--mono);font-size:10px;text-align:center;margin-top:24px;letter-spacing:.5px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>TRAIN<span class="acc">.</span></h1>
      <div class="todaytag">5-day split<b id="todayName">—</b></div>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>
  <main id="view"></main>
  <div class="save">data saved locally on this device</div>
</div>
<div class="toast" id="toast">Logged</div>

<script>
/* ---------- PLAN ---------- */
const REST_COMP="2–3 min", REST_SS="45–60s", REST_CORE="45–60s";

// loggable kinds: 'w'=weight×reps, 'br'=bodyweight reps, 'time'=hold seconds
const PLAN = {
  mon:{day:"Mon",label:"Push",core:"A",jog:25,jogOpt:false,
    main:[
      {id:"incline_bb",name:"Incline barbell bench",scheme:"4×6–8",rest:REST_COMP,kind:"w",inc:5,lo:6,hi:8},
      {id:"flat_db",name:"Flat DB press",scheme:"3×8–10",rest:REST_COMP,kind:"w",inc:5,lo:8,hi:10},
      {id:"seated_ohp",name:"Seated shoulder press",scheme:"3×8–10",rest:REST_COMP,kind:"w",inc:5,lo:8,hi:10},
      {ss:true,scheme:"3×12–15",rest:REST_SS,a:{id:"lat_raise",name:"Lateral raises",kind:"w",inc:2.5,lo:12,hi:15},
        b:{id:"tri_pushdown",name:"Tricep pushdown",kind:"w",inc:5,lo:12,hi:15}},
    ]},
  tue:{day:"Tue",label:"Pull",core:"B",jog:25,jogOpt:false,
    main:[
      {id:"pullup",name:"Pull-ups",scheme:"4×6–8",rest:REST_COMP,kind:"w",inc:5,lo:6,hi:8,bwAdd:true},
      {id:"bb_row",name:"Barbell row",scheme:"4×8",rest:REST_COMP,kind:"w",inc:5,lo:8,hi:8},
      {id:"lat_pulldown",name:"Lat pulldown",scheme:"3×10",rest:REST_COMP,kind:"w",inc:5,lo:10,hi:10},
      {ss:true,scheme:"3×12–15",rest:REST_SS,a:{id:"face_pull",name:"Face pulls",kind:"w",inc:5,lo:12,hi:15},
        b:{id:"db_curl",name:"DB curls",kind:"w",inc:2.5,lo:12,hi:15}},
    ]},
  wed:{day:"Wed",label:"Legs",core:"C",jog:10,jogOpt:true,
    main:[
      {id:"back_squat",name:"Back squat",scheme:"4×6–8",rest:REST_COMP,kind:"w",inc:10,lo:6,hi:8},
      {id:"rdl",name:"Romanian deadlift",scheme:"3×8",rest:REST_COMP,kind:"w",inc:10,lo:8,hi:8},
      {id:"bulg_split",name:"Bulgarian split squat",scheme:"3×10/leg",rest:REST_COMP,kind:"w",inc:5,lo:10,hi:10},
      {ss:true,scheme:"3×12–15",rest:REST_SS,a:{id:"leg_curl",name:"Leg curl",kind:"w",inc:5,lo:12,hi:15},
        b:{id:"calf_raise",name:"Calf raise",kind:"w",inc:10,lo:12,hi:15}},
    ]},
  thu:{day:"Thu",label:"Upper",sub:"lighter pump",pump:true,core:"A",jog:25,jogOpt:false,
    main:[
      {ss:true,scheme:"3×12",rest:REST_SS,a:{id:"incl_db_p",name:"Incline DB press",kind:"w",inc:5,lo:12,hi:12},
        b:{id:"cs_row",name:"Chest-supported row",kind:"w",inc:5,lo:12,hi:12}},
      {ss:true,scheme:"3×12–15",rest:REST_SS,a:{id:"db_ohp_t",name:"DB shoulder press",kind:"w",inc:5,lo:12,hi:15},
        b:{id:"lat_raise_t",name:"Lateral raise",kind:"w",inc:2.5,lo:12,hi:15}},
      {ss:true,scheme:"3×15",rest:REST_SS,a:{id:"cable_curl_t",name:"Cable curl",kind:"w",inc:5,lo:15,hi:15},
        b:{id:"pushdown_t",name:"Pushdown",kind:"w",inc:5,lo:15,hi:15}},
    ]},
  fri:{day:"Fri",label:"Arms",core:"B",jog:25,jogOpt:false,
    main:[
      {id:"cgbp",name:"Close-grip bench",scheme:"4×8",rest:REST_COMP,kind:"w",inc:5,lo:8,hi:8},
      {ss:true,scheme:"3×10–12",rest:REST_SS,a:{id:"bb_curl",name:"Barbell curl",kind:"w",inc:5,lo:10,hi:12},
        b:{id:"skullcrush",name:"Skull crushers",kind:"w",inc:5,lo:10,hi:12}},
      {ss:true,scheme:"3×12–15",rest:REST_SS,a:{id:"hammer",name:"Hammer curls",kind:"w",inc:2.5,lo:12,hi:15},
        b:{id:"rope_pd",name:"Rope pushdown",kind:"w",inc:5,lo:12,hi:15}},
      {id:"wrist_curl",name:"Wrist curls",scheme:"3×15",rest:REST_SS,kind:"w",inc:2.5,lo:15,hi:15},
    ]},
};

const CORE = {
  A:{tag:"Pack A",moves:[
    {id:"crunch_a",name:"Crunches",scheme:"3×20",kind:"br"},
    {id:"plank_a",name:"Plank",scheme:"3×45–60s",kind:"time"},
    {id:"rtwist_a",name:"Russian twists",scheme:"3×20",kind:"br"}]},
  B:{tag:"Pack B",moves:[
    {id:"cable_crunch_b",name:"Cable crunch",scheme:"4×15",kind:"w",inc:5,lo:15,hi:15},
    {id:"abwheel_b",name:"Ab-wheel rollout",scheme:"3×8–10",kind:"br"},
    {id:"wtwist_b",name:"Weighted Russian twists",scheme:"3×20",kind:"w",inc:2.5,lo:20,hi:20}]},
  C:{tag:"Pack C · leg-friendly",moves:[
    {id:"plank_c",name:"Plank",scheme:"3×60s",kind:"time"},
    {id:"side_plank_c",name:"Side plank",scheme:"3×40s/side",kind:"time"},
    {id:"rtwist_c",name:"Russian twists",scheme:"3×20",kind:"br"}]},
};

const ORDER=["mon","tue","wed","thu","fri","sat","sun"];
const JS_TO_KEY={1:"mon",2:"tue",3:"wed",4:"thu",5:"fri",6:"sat",0:"sun"};

/* ---------- STORAGE ---------- */
const DB_KEY="train_log_v1";
function loadDB(){try{return JSON.parse(localStorage.getItem(DB_KEY))||{}}catch(e){return{}}}
function saveDB(d){try{localStorage.setItem(DB_KEY,JSON.stringify(d))}catch(e){}}
let DB=loadDB();
function exHist(id){return DB[id]||[]}
function logEx(id,entry){ (DB[id]=DB[id]||[]).push({...entry,t:Date.now()}); if(DB[id].length>40)DB[id]=DB[id].slice(-40); saveDB(DB); }
function bestOf(id){
  const h=exHist(id); if(!h.length)return null;
  return h.reduce((b,e)=>{ const s=(e.w||0)*1000+(e.r||e.s||0); const bs=(b.w||0)*1000+(b.r||b.s||0); return s>bs?e:b; });
}

/* ---------- OVERLOAD ESTIMATOR ---------- */
function suggest(ex){
  const h=exHist(ex.id); if(!h.length) return null;
  const last=h[h.length-1];
  const w=last.w||0, r=last.r||0;
  // double progression: hit top of range on logged top set -> add load, reset to bottom
  if(ex.hi && r>=ex.hi){
    const nw=w+ (ex.inc||5);
    return {action:"up",text:`Hit top of range → <span class="up">${fmt(nw)} for ${ex.lo} reps</span>`,last:`last: ${fmt(w)}×${r}`};
  }
  if(w===0){ return {action:"hold",text:`Add 1–2 reps, then add load`,last:`last: ${r} reps`}; }
  return {action:"hold",text:`Same <b>${fmt(w)}</b> → beat <span class="up">${Math.min(r+1,ex.hi||r+1)} reps</span>`,last:`last: ${fmt(w)}×${r}`};
}
function fmt(n){ return (Math.round(n*10)/10).toString().replace(/\.0$/,""); }

/* ---------- RENDER ---------- */
const todayKey=JS_TO_KEY[new Date().getDay()];
let activeKey=todayKey;

function renderTabs(){
  const t=document.getElementById("tabs"); t.innerHTML="";
  ORDER.forEach(k=>{
    const isRest=!PLAN[k];
    const lbl=isRest?"Rest":PLAN[k].label;
    const d=isRest?(k==="sat"?"SAT":"SUN"):PLAN[k].day.toUpperCase();
    const el=document.createElement("button");
    el.className="tab"+(isRest?" rest":"")+(k===activeKey?" active":"")+(k===todayKey?" today":"");
    el.innerHTML=`<small>${d}</small>${lbl}`;
    el.onclick=()=>{activeKey=k;renderTabs();renderDay();window.scrollTo({top:0,behavior:"smooth"});};
    t.appendChild(el);
  });
  document.getElementById("todayName").textContent =
    PLAN[todayKey]?`${PLAN[todayKey].day} · ${PLAN[todayKey].label}`:"Rest day";
}

function loggable(m){
  // returns input row html for a movement
  if(m.kind==="time"){
    return `<div class="logrow" data-id="${m.id}" data-kind="time">
      <input type="number" placeholder="sec" inputmode="numeric" data-f="s"><span class="unit">sec hold</span>
      <button onclick="doLog('${m.id}')">Log</button></div>`;
  }
  if(m.kind==="br"){
    return `<div class="logrow" data-id="${m.id}" data-kind="br">
      <input type="number" placeholder="reps" inputmode="numeric" data-f="r"><span class="unit">reps</span>
      <button onclick="doLog('${m.id}')">Log</button></div>`;
  }
  // weighted
  return `<div class="logrow" data-id="${m.id}" data-kind="w">
    <input type="number" placeholder="lb" inputmode="decimal" data-f="w"><span class="x">×</span>
    <input type="number" placeholder="reps" inputmode="numeric" data-f="r"><span class="unit">top set</span>
    <button onclick="doLog('${m.id}')">Log</button></div>`;
}
function hintBox(m){ return `<div class="hint" id="hint_${m.id}"></div>`; }

function exBlock(item){
  if(item.ss){
    const a=item.a,b=item.b;
    return `<div class="ex">
      <div class="ex-top">
        <div class="ex-name">Superset
          <span class="sup"><b>${a.name}</b> + <b>${b.name}</b></span></div>
        <div class="ex-scheme">${item.scheme}</div>
      </div>
      ${loggable(a)}${hintBox(a)}
      ${loggable(b)}${hintBox(b)}
    </div>`;
  }
  const extra=item.bwAdd?` <span class="sup">log added weight (0 = bodyweight)</span>`:"";
  return `<div class="ex">
    <div class="ex-top">
      <div class="ex-name">${item.name}${extra}</div>
      <div class="ex-scheme">${item.scheme}</div>
    </div>
    ${loggable(item)}${hintBox(item)}
  </div>`;
}

function renderDay(){
  const v=document.getElementById("view");
  const p=PLAN[activeKey];
  if(!p){
    v.innerHTML=`<div class="restday"><div class="em">🛌</div>
      <h2>Rest day</h2>
      <p>Full recovery. Walk, hydrate, sleep 7–9h. Muscle is built between sessions, not during them.</p></div>`;
    return;
  }
  const core=CORE[p.core];
  let html=`<div class="dayhead">
    <h2>${p.day} · ${p.label}</h2>
    <div class="focus">${p.sub?p.sub:p.label} day</div></div>`;

  // warmup
  html+=`<div class="section">
    <div class="sechead"><span class="ico">🔥</span>Warmup<span class="rest">easy pace</span></div>
    <div class="ex"><div class="ex-top"><div class="ex-name">Easy cardio
      <span class="sup">bike / row / incline walk — raise temp, no fatigue</span></div>
      <div class="ex-scheme">5 min</div></div></div></div>`;

  // main
  html+=`<div class="section">
    <div class="sechead"><span class="ico">🏋️</span>Main lifts<span class="rest">${REST_COMP} · SS ${REST_SS}</span></div>
    ${p.main.map(exBlock).join("")}</div>`;

  // core
  html+=`<div class="section">
    <div class="sechead"><span class="ico">🎯</span>Core — ${core.tag}<span class="rest">${REST_CORE}</span></div>
    ${core.moves.map(m=>exBlock(m)).join("")}</div>`;

  // jog
  html+=`<div class="section">
    <div class="sechead"><span class="ico">🏃</span>Jog <span class="rest">after the lift</span></div>
    <div class="jog ${p.jogOpt?"opt":""}">
      <div class="big">${p.jog}'</div>
      <div class="lbl">${p.jogOpt?"Optional / short — legs already cooked. Skip if drained.":"Steady conversational pace. Conditioning, not a race."}</div>
    </div></div>`;

  // estimators
  html+=burnCard(p);
  html+=trackerCard(p);

  v.innerHTML=html;
  refreshHints(p);
}

/* burn estimator */
function burnCard(p){
  const liftMin = 42; // est working time main+core
  return `<div class="card">
    <h3><span class="ico">🔥</span>Calorie burn — ${p.day}</h3>
    <div class="field"><label>Bodyweight</label>
      <input type="number" id="bw" inputmode="decimal" value="${getBW()}" onchange="onBW()"><span class="unit" style="font-family:var(--mono);color:var(--muted);font-size:11px">lb</span></div>
    <div class="field"><label>Jog this session</label>
      <input type="number" id="jogmin" inputmode="numeric" value="${p.jog}" onchange="calcBurn()"><span class="unit" style="font-family:var(--mono);color:var(--muted);font-size:11px">min</span></div>
    <div class="burnout" id="burnout"></div>
  </div>`;
}
function getBW(){ return localStorage.getItem("train_bw")||180; }
function onBW(){ const v=document.getElementById("bw").value; if(v)localStorage.setItem("train_bw",v); calcBurn(); }
function calcBurn(){
  const out=document.getElementById("burnout"); if(!out)return;
  const lb=parseFloat(document.getElementById("bw").value)||180;
  const kg=lb*0.4536;
  const jog=parseFloat(document.getElementById("jogmin").value)||0;
  // MET: warmup 4, lifting (incl core, with supersets) 5, jog ~9
  const parts=[
    {n:"Warmup (5 min)",met:4,min:5},
    {n:"Lifting + core (~42 min)",met:5,min:42},
    {n:`Jog (${jog} min)`,met:9,min:jog},
  ];
  let tot=0,rows="";
  parts.forEach(pt=>{ const c=Math.round(pt.met*kg*(pt.min/60)); tot+=c;
    rows+=`<div class="brow"><span>${pt.n}</span><span>${c} kcal</span></div>`; });
  out.innerHTML=rows+`<div class="btot"><span>Session total</span><span>${tot} kcal</span></div>`;
}

/* progress tracker */
function trackerCard(p){
  const ids=[];
  p.main.forEach(it=> it.ss?ids.push(it.a,it.b):ids.push(it));
  let body="";
  ids.forEach(m=>{
    const h=exHist(m.id);
    if(!h.length){ return; }
    const best=bestOf(m.id);
    const series=h.slice(-8).map(e=> (e.w||0)>0?(e.w*(1+ (e.r||1)/30)) : (e.r||e.s||0) ); // epley-ish est 1rm or reps
    const max=Math.max(...series,1);
    const bars=series.map((s,i)=>`<div class="bar ${i===series.length-1?"last":""}" style="height:${Math.max(8,(s/max)*100)}%"></div>`).join("");
    const last=h[h.length-1];
    const lastTxt = (last.w||0)>0?`${fmt(last.w)}×${last.r}`:(last.s!=null?`${last.s}s`:`${last.r} reps`);
    const bestTxt = best?((best.w||0)>0?`${fmt(best.w)}×${best.r}`:(best.s!=null?`${best.s}s`:`${best.r}`)):"—";
    body+=`<div class="trk-ex">
      <div class="nm"><span>${m.name}</span><span class="best">PR ${bestTxt}</span></div>
      <div class="spark">${bars}</div>
      <div class="trk-meta"><span>${h.length} session${h.length>1?"s":""}</span><span>last ${lastTxt}</span></div>
    </div>`;
  });
  if(!body) body=`<div class="trk-empty">Log a set above and your progression shows up here.</div>`;
  return `<div class="card">
    <h3><span class="ico">📈</span>Progress — ${p.label}</h3>
    ${body}
    <button class="clearbtn" onclick="clearDay()">Reset this day's history</button>
  </div>`;
}
function clearDay(){
  if(!confirm("Delete logged history for this day's exercises?"))return;
  const p=PLAN[activeKey]; const ids=[];
  p.main.forEach(it=> it.ss?ids.push(it.a.id,it.b.id):ids.push(it.id));
  ids.forEach(id=>delete DB[id]); saveDB(DB); renderDay();
}

/* logging action */
function findMove(id){
  for(const k in PLAN){ for(const it of PLAN[k].main){
    if(it.ss){ if(it.a.id===id)return{...it.a,hi:it.a.hi,lo:it.a.lo}; if(it.b.id===id)return{...it.b}; }
    else if(it.id===id)return it;
  }}
  for(const c in CORE){ for(const m of CORE[c].moves){ if(m.id===id)return m; } }
  return null;
}
function doLog(id){
  const row=document.querySelector(`.logrow[data-id="${id}"]`);
  const kind=row.dataset.kind;
  const get=f=>{const el=row.querySelector(`[data-f="${f}"]`);return el?parseFloat(el.value):null;};
  let entry={};
  if(kind==="w"){ const w=get("w"),r=get("r"); if(r==null||isNaN(r)){flash("Enter reps");return;} entry={w:isNaN(w)?0:w,r}; }
  else if(kind==="br"){ const r=get("r"); if(r==null||isNaN(r)){flash("Enter reps");return;} entry={r}; }
  else { const s=get("s"); if(s==null||isNaN(s)){flash("Enter seconds");return;} entry={s}; }
  logEx(id,entry);
  row.querySelectorAll("input").forEach(i=>i.value="");
  flash("Logged ✓");
  const p=PLAN[activeKey];
  refreshHints(p);
  // re-render tracker portion
  renderDay();
}
function refreshHints(p){
  const all=[];
  p.main.forEach(it=> it.ss?all.push(it.a,it.b):all.push(it));
  all.forEach(m=>{
    const box=document.getElementById("hint_"+m.id); if(!box)return;
    const s=suggest(m);
    if(!s){ box.classList.remove("show"); return; }
    box.classList.add("show");
    box.innerHTML=`<span class="lvl">▲ next:</span> ${s.text} &nbsp;<span class="last">${s.last}</span>`;
  });
}

let toastT;
function flash(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1400);
}

/* init */
renderTabs(); renderDay(); calcBurn();
</script>
