<style>
/* ==================== CORE STYLES ==================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#059669;--primary-light:#d1fae5;--primary-dark:#047857;
  --accent:#3b7ef8;--accent-dim:#eff3fe;
  --sidebar-bg:#0f172a;--sidebar-hover:#1e293b;--sidebar-active:#1e293b;
  --sidebar-text:#94a3b8;--sidebar-text-active:#f8fafc;
  --bg:#f3f4f6;--surface:#fff;--border:#e5e7eb;--border-strong:#d1d5db;
  --text:#111827;--text-secondary:#6b7280;--text-muted:#9ca3af;
  --green:#16a34a;--green-dim:#f0fdf4;--red:#dc2626;--red-dim:#fef2f2;
  --amber:#d97706;--amber-dim:#fffbeb;--purple:#7c3aed;--purple-dim:#f5f3ff;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.12);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px;line-height:1.5}
#setup{position:fixed;inset:0;background:rgba(10,14,35,.85);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
#setup.show{display:flex}
.setup-box{background:#fff;border-radius:18px;padding:36px;width:520px;max-width:96vw;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.setup-brand{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.setup-tag{font-size:13px;color:var(--text-muted);margin-bottom:24px}
.step-dots{display:flex;gap:8px;margin-bottom:24px}
.sdot{width:9px;height:9px;border-radius:50%;background:var(--border);transition:background .2s}
.sdot.on{background:var(--primary)}
.step-pane{display:none}.step-pane.active{display:block}
.step-h{font-size:17px;font-weight:700;margin-bottom:8px}
.step-p{font-size:13px;color:var(--text-secondary);line-height:1.65;margin-bottom:16px}
.setup-input{width:100%;padding:11px 14px;border:1.5px solid var(--border-strong);border-radius:8px;font-size:14px;color:var(--text);background:#fafafa;margin-bottom:14px}
.setup-input:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(5,150,105,.12)}
.setup-row{display:flex;gap:10px}
.setup-skip{margin-top:14px;background:none;border:none;font-size:12px;color:var(--text-muted);cursor:pointer;text-decoration:underline}

/* Sidebar & Main */
.sidebar{width:236px;min-width:236px;background:var(--sidebar-bg);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.main{flex:1;overflow-y:auto;height:100vh;display:flex;flex-direction:column}
.page{display:none;flex:1}.page.active{display:flex;flex-direction:column;flex:1}

/* Rest of your original styles (unchanged for brevity) */
/* ... (all the original CSS you had) ... */

/* Mobile fixes */
@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%);transition:transform .22s;z-index:100}
  .sidebar.open{transform:translateX(0)}
  #mobileMenuBtn{display:flex !important}
  .main{margin-left:0;padding-top:56px}
}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#0f172a;color:#f8fafc;padding:12px 20px;border-radius:8px;font-size:14px;box-shadow:0 10px 25px rgba(0,0,0,.25);z-index:400;animation:toastUp .3s}
@keyframes toastUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
