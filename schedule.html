<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training System</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#0d0f12; --card:#161a1f; --card2:#1d222a; --line:#2a313b;
    --text:#eef2f6; --muted:#8b97a6; --accent:#3ad17a; --accent2:#2e9bff;
    --hard:#ff5d4a; --abs:#ffb03a;
  }
  body{ background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; padding:16px 14px 60px; max-width:680px; margin:0 auto; line-height:1.45; }
  h1{ font-size:24px; letter-spacing:-.3px; }
  .sub{ color:var(--muted); font-size:13px; margin-top:2px; }
  .tabs{ display:flex; gap:6px; margin:18px 0 16px; overflow-x:auto; padding-bottom:4px; }
  .tab{ flex:0 0 auto; background:var(--card); border:1px solid var(--line); color:var(--muted); padding:9px 13px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .tab.active{ background:var(--accent); color:#06240f; border-color:var(--accent); }
  .tab.rest.active{ background:var(--accent2); color:#04203f; border-color:var(--accent2); }
  .day{ display:none; }
  .day.show{ display:block; animation:f .25s ease; }
  @keyframes f{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
  .focus{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .focus .name{ font-size:19px; font-weight:700; }
  .pill{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:.4px; }
  .pill.lift{ background:rgba(58,209,122,.15); color:var(--accent); }
  .pill.run{ background:rgba(46,155,255,.15); color:var(--accent2); }
  .pill.restp{ background:rgba(139,151,166,.15); color:var(--muted); }
  .block{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  .block h3{ font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:7px; }
  .block.abs h3{ color:var(--abs); }
  .block.cardio h3{ color:var(--accent2); }
  .block.warm h3{ color:var(--accent2); }
  .ex{ display:grid; grid-template-columns:1fr auto; gap:4px 10px; padding:9px 0; border-bottom:1px solid var(--line); align-items:center; }
  .ex:last-child{ border-bottom:0; }
  .ex .nm{ font-size:14.5px; font-weight:600; }
  .ex .sets{ font-size:13px; color:var(--muted); text-align:right; white-space:nowrap; }
  .ex .note{ grid-column:1/-1; font-size:12px; color:var(--muted); }
  .cardio-line{ font-size:15px; font-weight:600; }
  .cardio-line b{ color:var(--accent2); }
  .tip{ background:var(--card2); border-left:3px solid var(--accent); border-radius:8px; padding:10px 12px; font-size:13px; color:#c8d2dd; margin-top:4px; }
  .tip.warn{ border-left-color:var(--abs); }
  .divider{ display:flex; align-items:center; gap:10px; margin:26px 0 14px; }
  .divider .ln{ flex:1; height:1px; background:var(--line); }
  .divider span{ font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:700; }
  /* tracker */
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; }
  .panel h2{ font-size:16px; margin-bottom:4px; }
  .row{ display:grid; grid-template-columns:1fr 78px 78px; gap:8px; align-items:center; margin-top:10px; }
  .row.head{ font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-top:14px; }
  .row .lbl{ font-size:13.5px; font-weight:600; }
  input{ width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text); border-radius:9px; padding:9px 8px; font-size:15px; text-align:center; font-weight:600; }
  input:focus{ outline:none; border-color:var(--accent); }
  .est{ text-align:center; font-size:14px; font-weight:700; color:var(--accent); padding:9px 0; }
  .btn{ width:100%; background:var(--accent); color:#06240f; border:0; border-radius:11px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; margin-top:16px; }
  .btn.sec{ background:var(--card2); color:var(--text); border:1px solid var(--line); margin-top:9px; }
  .cal{ display:flex; gap:10px; margin:14px 0; }
  .cal .c{ flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px; text-align:center; }
  .cal .big{ font-size:23px; font-weight:800; color:var(--accent); }
  .cal .lab{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-top:2px; }
  .small{ font-size:12px; color:var(--muted); }
  label.f{ display:block; font-size:12px; color:var(--muted); margin:12px 0 5px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .save-note{ font-size:12px; text-align:center; color:var(--muted); margin-top:10px; min-height:16px; }
</style>
</head>
<body>

<h1>Training System</h1>
<div class="sub">5-day split · built to burn and recover · log your numbers, get next week</div>

<div class="tabs" id="tabs"></div>

<!-- DAYS RENDER HERE -->
<div id="days"></div>

<!-- TRACKER RENDERS HERE (always visible, below workouts) -->
<div id="tracker"></div>

<script>
// ---------- PROGRAM ----------
// 5-day split: Push / Pull / Legs / Upper(lighter pump) / Arms, then two days off.
// Every lifting day starts with the run warmup and ends with a hard ab finisher.
const WARMUP = `45-minute jog <b>or</b> 4 miles — whichever finishes last`;

const ABS = {
  A: ["Hanging leg raises — 3×12","Cable/weighted crunch — 3×15","Bicycle kicks — 3×30s","Plank — 1×max hold"],
  B: ["Toes-to-bar (or knee raise) — 3×10","Ab-wheel rollout — 3×10","Russian twists (weighted) — 3×20","Hollow-body hold — 3×30s"],
  C: ["V-ups — 3×15","Mountain climbers — 3×40s","Side plank — 2×30s/side","Flutter kicks — 3×30s"],
};

const DAYS = [
  { key:"Mon", focus:"Push — Chest / Shoulders / Tris", type:"lift",
    main:[
      ["Incline barbell bench","4 × 6–8"],
      ["Flat DB press","3 × 8–10"],
      ["Seated shoulder press","3 × 8–10"],
      ["Lateral raises","3 × 15"],
      ["Overhead tricep ext","3 × 12"],
      ["Tricep pushdown","3 × 12"],
    ], abs:"A" },
  { key:"Tue", focus:"Pull — Back / Biceps", type:"lift",
    main:[
      ["Pull-ups (weighted if able)","4 × 6–8"],
      ["Barbell row","4 × 8"],
      ["Lat pulldown","3 × 10"],
      ["Seated cable row","3 × 10"],
      ["Face pulls","3 × 15"],
      ["Barbell / DB curls","3 × 10"],
    ], abs:"B" },
  { key:"Wed", focus:"Legs — Quads / Hams / Glutes", type:"lift",
    main:[
      ["Back squat","4 × 6–8"],
      ["Romanian deadlift","3 × 8"],
      ["Leg press","3 × 12"],
      ["Walking lunges","3 × 12/leg"],
      ["Leg curl","3 × 12"],
      ["Standing calf raise","4 × 15"],
    ], abs:"C" },
  { key:"Thu", focus:"Upper — Lighter Pump + Mobility", type:"lift",
    main:[
      ["Incline DB press","3 × 12 (lighter)"],
      ["Chest-supported row","3 × 12"],
      ["DB shoulder press","3 × 12"],
      ["Cable lateral raise","3 × 15"],
      ["Cable curl + pushdown superset","3 × 15 each"],
      ["10-min easy mobility / stretch","—"],
    ], abs:"A", note:"Deliberately lighter — this is the day your muscles grow back. Chase a pump, not a max." },
  { key:"Fri", focus:"Arms — Biceps / Triceps / Forearms", type:"lift",
    main:[
      ["Close-grip bench press","4 × 8"],
      ["Barbell curl","4 × 10"],
      ["Skull crushers (EZ-bar)","3 × 12"],
      ["Incline DB curl","3 × 12"],
      ["Rope pushdown","3 × 15"],
      ["Hammer curls","3 × 12"],
      ["Wrist curls + reverse wrist curls","3 × 15 each"],
    ], abs:"B", note:"Pure arm day — superset a bicep move with a tricep move to keep the pump and save time. Push the last set of each to failure." },
  { key:"Sat", focus:"Full Rest", type:"rest", main:[], abs:null,
    note:"Non-negotiable. No gym. Walk, eat, sleep. This is when the muscle you're building actually repairs — recovery is when fat drops and gains show up. Skipping it slows your results, not speeds them." },
  { key:"Sun", focus:"Full Rest", type:"rest", main:[], abs:null,
    note:"Second rest day. Keep it easy — light walk, good food, full night's sleep. Come back into Monday's push day fresh and strong." },
];

// ---------- RENDER DAYS ----------
const tabsEl = document.getElementById("tabs");
const daysEl = document.getElementById("days");

DAYS.forEach((d,i)=>{
  const t = document.createElement("div");
  t.className = "tab" + (d.type==="rest"?" rest":"");
  t.textContent = d.key;
  t.onclick = ()=>show(i);
  tabsEl.appendChild(t);

  const sec = document.createElement("div");
  sec.className = "day"; sec.id = "day"+i;

  const pill = d.type==="lift" ? '<span class="pill lift">Lift</span>'
             : d.type==="run" ? '<span class="pill run">Run</span>'
             : '<span class="pill restp">Rest</span>';
  let html = `<div class="focus"><span class="name">${d.focus}</span>${pill}</div>`;

  if(d.type!=="rest"){
    // run warmup leads off every lifting day
    html += `<div class="block warm"><h3>🏃 Warmup run</h3>
      <div class="cardio-line">${WARMUP}</div>
      <div class="tip">Run at a pace you can hold. If you hit 4 miles before 45 min, keep going till the clock's up. If 45 min comes first, finish the 4th mile. Whichever ends last — then hit the weights.</div></div>`;
    if(d.main.length){
      html += `<div class="block"><h3>🏋️ Main lifts</h3>`;
      d.main.forEach(([nm,sets])=>{ html += `<div class="ex"><span class="nm">${nm}</span><span class="sets">${sets}</span></div>`; });
      html += `</div>`;
    }
    if(d.abs){
      html += `<div class="block abs"><h3>🔥 Ab finisher — go to failure</h3>`;
      ABS[d.abs].forEach(a=>{ const [nm,sets] = a.split(" — "); html += `<div class="ex"><span class="nm">${nm}</span><span class="sets">${sets||""}</span></div>`; });
      html += `</div>`;
    }
  }
  if(d.note){ html += `<div class="tip ${d.type==='rest'?'warn':''}">${d.note}</div>`; }

  sec.innerHTML = html;
  daysEl.appendChild(sec);
});

function show(i){
  document.querySelectorAll(".tab").forEach((t,n)=>t.classList.toggle("active", n===i));
  document.querySelectorAll(".day").forEach((s,n)=>s.classList.toggle("show", n===i));
}
// open to today (Mon=0 ... Sun=6)
const jsDay = new Date().getDay(); // 0 Sun .. 6 Sat
const map = {1:0,2:1,3:2,4:3,5:4,6:5,0:6};
show(map[jsDay]);

// ---------- TRACKER (always visible below the workout days) ----------
const trackerLifts = ["Bench / Press","Squat","Deadlift","Row / Pull"];
let trackHtml = `
  <div class="divider"><div class="ln"></div><span>Progress Tracker</span><div class="ln"></div></div>
  <div class="panel">
    <h2>📈 Log this week → get next week</h2>
    <div class="small">Enter the top weight × reps you hit on each. It estimates next week using progressive overload (small, sustainable jumps).</div>
    <div class="row head"><span>Lift</span><span>Weight</span><span>Reps</span></div>`;
trackerLifts.forEach((l,i)=>{
  trackHtml += `<div class="row"><span class="lbl">${l}</span>
    <input type="number" id="w${i}" inputmode="numeric" placeholder="lb">
    <input type="number" id="r${i}" inputmode="numeric" placeholder="reps"></div>
    <div class="est" id="e${i}">next week → enter numbers</div>`;
});
trackHtml += `<button class="btn" onclick="estimate()">Estimate next week</button>
  <button class="btn sec" onclick="saveWeek()">Save this week</button>
  <div class="save-note" id="saveNote"></div></div>

  <div class="panel" style="margin-top:14px">
    <h2>🔥 Calorie burn estimate</h2>
    <div class="grid2">
      <div><label class="f">Bodyweight (lb)</label><input type="number" id="bw" inputmode="numeric" placeholder="235" oninput="calcCals()"></div>
      <div><label class="f">Day type</label>
        <select id="dtype" onchange="calcCals()" style="width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px 8px;font-size:15px;font-weight:600;">
          <option value="lift">Lift + run warmup + abs</option>
          <option value="rest">Rest day</option>
        </select>
      </div>
    </div>
    <div class="cal">
      <div class="c"><div class="big" id="calWorkout">—</div><div class="lab">Workout burn</div></div>
      <div class="c"><div class="big" id="calTotal">—</div><div class="lab">Total day</div></div>
    </div>
    <div class="small">Rough estimates — a 235 lb athlete with real muscle usually burns on the higher end. Use the scale + mirror over 2 weeks as your real feedback, not any single number.</div>
  </div>
`;
document.getElementById("tracker").innerHTML = trackHtml;

// progressive overload logic
function estimate(){
  for(let i=0;i<trackerLifts.length;i++){
    const w = parseFloat(document.getElementById("w"+i).value);
    const r = parseInt(document.getElementById("r"+i).value);
    const out = document.getElementById("e"+i);
    if(!w || !r){ out.textContent="next week → enter numbers"; continue; }
    // if you hit top of rep range (>=10), bump weight ~5lb and reset reps to 6-8; else add 1-2 reps
    let msg;
    if(r >= 10){
      const nw = Math.round((w + (w>150?10:5)));
      msg = `next week → <b>${nw} lb</b> for 6–8 reps`;
    } else {
      msg = `next week → <b>${w} lb</b> for ${r+1}–${r+2} reps`;
    }
    out.innerHTML = msg;
  }
}

// calories — now includes the run warmup on lift days
function calcCals(){
  const bw = parseFloat(document.getElementById("bw").value);
  const type = document.getElementById("dtype").value;
  if(!bw){ document.getElementById("calWorkout").textContent="—"; document.getElementById("calTotal").textContent="—"; return; }
  const scale = bw/200;
  let wMin,wMax;
  if(type==="lift"){ wMin=760; wMax=1100; }  // run warmup (~500-680) + lifting + abs
  else { wMin=0; wMax=0; }
  const wb = Math.round(((wMin+wMax)/2)*scale);
  const bmr = Math.round(370 + 9.8*(bw/2.205));
  const total = Math.round(bmr*1.35 + wb);
  document.getElementById("calWorkout").textContent = wb? wb : "0";
  document.getElementById("calTotal").textContent = total;
}

function saveWeek(){
  const data = {};
  for(let i=0;i<trackerLifts.length;i++){ data["w"+i]=document.getElementById("w"+i).value; data["r"+i]=document.getElementById("r"+i).value; }
  try{ window._lastWeek = data; document.getElementById("saveNote").textContent="Saved for this session ✓ (re-enter next week to compare)"; }
  catch(e){ document.getElementById("saveNote").textContent="Saved for this session ✓"; }
}
</script>
</body>
</html>
